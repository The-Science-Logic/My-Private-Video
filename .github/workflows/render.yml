name: Blender Render
on: workflow_dispatch
jobs:
  render:
    runs-on: ubuntu-latest
    container: nytimes/rd-blender-docker:latest # Using a verified Blender environment
    steps:
      - uses: actions/checkout@v4
      - name: Save BPY from Secret
        run: echo "${{ secrets.MY_BPY_SCRIPT }}" > script.bpy
      - name: Render MP4
        run: |
          blender -b -P script.bpy --python-expr "import bpy; bpy.context.scene.render.filepath='//output.mp4'; bpy.ops.render.render(animation=True)"
      - uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: output.mp4
          retention-days: 1
